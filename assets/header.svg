      <stop offset="0%" style="stop-color:#060806"/>
      <stop offset="100%" style="stop-color:#0a0e0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
